server:
  port: 8090

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: Bloque-Gorro
              uri: lb://BloqueGorro
              predicates:
                - Path=/api/v1/gorros/**

            - id: bloque-gorro-docs
              uri: lb://BloqueGorro
              predicates:
                - Path=/Bloque-Gorro/api-docs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Bloque Gorro
        url: /bloque-gorro/api-docs
